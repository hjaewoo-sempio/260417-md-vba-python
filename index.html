<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>샘표식품 AI 매뉴얼</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f5f6f8;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            padding: 12px 12px 0 12px;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
        }

        .tab-btn {
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            color: #24292f;
            padding: 10px 16px;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .tab-btn.active {
            background: #ffffff;
            border-bottom-color: #ffffff;
        }

        .content {
            flex: 1;
            background: #ffffff;
        }

        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
        }

        .tab-panel.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }
    </style>
</head>

            <button class="tab-btn" onclick="showTab('python', this)">python</button>
        </div>

            &lt;div class=&quot;explanation-box&quot;&gt;

                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    엑셀은 철저한 계층 구조(족보)를 가집니다. &lt;strong&gt;엑셀프로그램(Application) &gt; 엑셀파일(Workbook) &gt; 시트(Worksheet) &gt; 셀(Range)&lt;/strong&gt; 순서입니다.

                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    점(&lt;code&gt;.&lt;/code&gt;)을 찍어가며 하부 구조로 파고들어 명령을 내립니다. AI 코드를 내 파일에 맞게 고칠 때 &lt;strong&gt;시트 이름&lt;/strong&gt;이나 &lt;strong&gt;셀 주소&lt;/strong&gt;를 고치는 경우가 90% 이상이므로 이 구조를 읽을 줄 알아야 합니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 특정 시트의 특정 셀에 값 쓰기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    가장 정석적인 방법입니다. 내 파일의 시트 이름이 &quot;Raw_Data&quot;라면 괄호 안의 이름을 내 시트명에 맞게 고쳐주면 됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; &quot;Sheet1&quot; 시트의 &quot;A1&quot; 셀의 값(Value)에 &quot;Hello&quot;를 넣어라&lt;/span&gt;
ThisWorkbook.Sheets(&lt;span class=&quot;string&quot;&gt;&quot;Sheet1&quot;&lt;/span&gt;).Range(&lt;span class=&quot;string&quot;&gt;&quot;A1&quot;&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;Hello&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;

                &lt;div class=&quot;example-desc&quot;&gt;
                    시트 이름을 명시하지 않고, 지금 눈에 보이는 활성화된 시트에 작업할 때 씁니다. 코드는 짧아지지만 다른 시트가 선택되어 있으면 엉뚱한 곳에 데이터가 들어갈 수 있어 주의해야 합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; 현재 화면에 띄워진 시트의 A1 셀에 100을 입력&lt;/span&gt;
ActiveSheet.Range(&lt;span class=&quot;string&quot;&gt;&quot;A1&quot;&lt;/span&gt;).Value = &lt;span class=&quot;number&quot;&gt;100&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 팁: 그냥 Range(&quot;A1&quot;)이라고만 쓰면 기본적으로 ActiveSheet를 뜻합니다.&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. With 구문 (코드 다이어트)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    같은 시트나 범위에 여러 번 명령을 내릴 때, &lt;code&gt;With ~ End With&lt;/code&gt;로 묶어줍니다. 점(&lt;code&gt;.&lt;/code&gt;)으로 시작하는 줄은 모두 &lt;code&gt;With&lt;/code&gt; 옆에 적힌 객체에 속합니다.

                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;With&lt;/span&gt; Sheets(&lt;span class=&quot;string&quot;&gt;&quot;보고서&quot;&lt;/span&gt;).Range(&lt;span class=&quot;string&quot;&gt;&quot;A1:A10&quot;&lt;/span&gt;)
    .Value = &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;        &lt;span class=&quot;comment&quot;&gt;&#x27; 값 10 입력&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;End With&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;

                &lt;div class=&quot;example-header&quot;&gt;4. Offset (몇 칸 이동할까?)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    기준 셀에서 지정한 행(아래위), 열(좌우) 만큼 이동한 셀을 가리킵니다. 반복 작업 할 때 많이 보게 됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; A1 셀을 기준으로 아래로 1칸, 오른쪽으로 1칸 이동 = B2 셀&lt;/span&gt;
Range(&lt;span class=&quot;string&quot;&gt;&quot;A1&quot;&lt;/span&gt;).Offset(&lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;여기는 B2&quot;&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 아래로만 3칸 이동 = A4 셀&lt;/span&gt;
Range(&lt;span class=&quot;string&quot;&gt;&quot;A1&quot;&lt;/span&gt;).Offset(&lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;0&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;여기는 A4&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. Cells (숫자로 위치 찾기)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;Range(&quot;A1&quot;)&lt;/code&gt; 대신 &lt;code&gt;Cells(행번호, 열번호)&lt;/code&gt;를 쓸 수도 있습니다. 반복문에서 숫자를 바꿔가며 돌릴 때 필수적입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; 1행, 1열 -&gt; A1 셀&lt;/span&gt;
Cells(&lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;가&quot;&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 2행, 3열 (C열) -&gt; C2 셀 (열 문자를 바로 써도 됩니다)&lt;/span&gt;
Cells(&lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;C&quot;&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;나&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 3 --&gt;
        &lt;section id=&quot;chapter3&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-emerald-100 text-emerald-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 3&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;변수와 Set (이름표 붙이기)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 일반 변수 vs 객체 변수&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    VBA는 변수를 쓸 때 &lt;code&gt;Dim 변수명 As 타입&lt;/code&gt; 형태로 미리 선언을 해줍니다.
                    가장 중요한 것은 일반 데이터(숫자, 문자)를 넣을 때와, &lt;strong&gt;엑셀의 객체(시트, 셀 범위)&lt;/strong&gt;를 넣을 때 문법이 다르다는 것입니다.
                &lt;/p&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mt-2 text-red-600 font-medium&quot;&gt;
                    * 객체를 변수에 담을 때는 반드시 앞에 &lt;code&gt;Set&lt;/code&gt;을 붙여야 합니다! (가장 많이 발생하는 에러 원인)
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 일반 변수 할당 (=)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    숫자, 문자열, 참/거짓 같은 데이터는 그냥 &lt;code&gt;=&lt;/code&gt; 기호로 넣습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; rCount &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Long&lt;/span&gt;    &lt;span class=&quot;comment&quot;&gt;&#x27; 큰 숫자를 담는 방&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; sName &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;String&lt;/span&gt;   &lt;span class=&quot;comment&quot;&gt;&#x27; 글자를 담는 방&lt;/span&gt;

rCount = &lt;span class=&quot;number&quot;&gt;1000&lt;/span&gt;
sName = &lt;span class=&quot;string&quot;&gt;&quot;매출데이터&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 객체 변수 할당 (Set)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    Worksheet나 Range처럼 눈에 보이는 엑셀의 &#x27;물건&#x27;을 변수에 담을 때는 무조건 &lt;code&gt;Set&lt;/code&gt;을 씁니다. 코드를 짧게 줄이기 위해 자주 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; ws &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Worksheet&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; rng &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Range&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 시트를 ws 라는 이름으로 부르겠다 (Set 필수!)&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Set&lt;/span&gt; ws = ThisWorkbook.Sheets(&lt;span class=&quot;string&quot;&gt;&quot;Sheet1&quot;&lt;/span&gt;)
&lt;span class=&quot;comment&quot;&gt;&#x27; A1:A10 범위를 rng 라고 부르겠다 (Set 필수!)&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Set&lt;/span&gt; rng = ws.Range(&lt;span class=&quot;string&quot;&gt;&quot;A1:A10&quot;&lt;/span&gt;)

&lt;span class=&quot;comment&quot;&gt;&#x27; 이제 길게 안 쓰고 변수로 바로 명령합니다.&lt;/span&gt;
rng.Value = &lt;span class=&quot;string&quot;&gt;&quot;테스트&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 객체 변수 초기화 (Set = Nothing)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    AI가 짜준 코드 마지막에 자주 보이는 형태입니다. 다 쓴 객체를 메모리에서 비워주는 깔끔한 마무리 작업입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; 작업이 다 끝난 후...&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Set&lt;/span&gt; rng = &lt;span class=&quot;keyword&quot;&gt;Nothing&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Set&lt;/span&gt; ws = &lt;span class=&quot;keyword&quot;&gt;Nothing&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. Variant 타입 (만능 상자)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    어떤 형태의 데이터가 들어올지 모를 때 &lt;code&gt;Variant&lt;/code&gt;를 씁니다. 뒤에 배울 &#x27;메모리 배열&#x27;을 만들 때 가장 핵심이 되는 타입입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; myData &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Variant&lt;/span&gt;

myData = &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;       &lt;span class=&quot;comment&quot;&gt;&#x27; 숫자도 되고&lt;/span&gt;
myData = &lt;span class=&quot;string&quot;&gt;&quot;글자&quot;&lt;/span&gt;   &lt;span class=&quot;comment&quot;&gt;&#x27; 글자도 되고&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;&#x27; 셀 범위 전체를 한방에 담을 수도 있습니다! (챕터 5 참고)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            
            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 흔한 에러 해결법 (Object Required)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    실행 중에 &#x27;객체가 필요합니다(Object Required)&#x27; 에러가 난다면 십중팔구 &lt;code&gt;Set&lt;/code&gt;을 빼먹었거나, 시트 이름의 오타 때문에 객체를 못 찾은 것입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; ws &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Worksheet&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 에러 발생! (Set 이 없음)&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;&#x27; ws = Sheets(&quot;Sheet1&quot;) &lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 정상 코드&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Set&lt;/span&gt; ws = Sheets(&lt;span class=&quot;string&quot;&gt;&quot;Sheet1&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 4 --&gt;
        &lt;section id=&quot;chapter4&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-emerald-100 text-emerald-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 4&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;반복문과 마지막 행 찾기&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 데이터가 끝날 때까지 돌려라&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    엑셀 자동화의 99%는 &quot;첫 줄부터 마지막 줄까지 반복하면서 뭔가 해라&quot; 입니다.
                    이때 가장 중요한 것이 &lt;strong&gt;&quot;데이터가 있는 마지막 줄이 몇 번째인지 알아내는 코드&quot;&lt;/strong&gt;입니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 마지막 행 찾기 (VBA 불변의 진리) ⭐&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    AI 코드를 보면 항상 등장하는 코드입니다. 시트 맨 밑(1048576행)에서 단축키 Ctrl+↑ 를 눌러서 멈추는 행의 번호를 가져오는 원리입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; lastRow &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Long&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; A열(&quot;A&quot;)을 기준으로 데이터가 있는 마지막 행 번호를 찾습니다.&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;&#x27; 만약 기준 데이터가 B열에 있다면 &quot;A&quot;를 &quot;B&quot;로 고쳐주면 됩니다.&lt;/span&gt;
lastRow = Cells(Rows.Count, &lt;span class=&quot;string&quot;&gt;&quot;A&quot;&lt;/span&gt;).End(xlUp).Row

&lt;span class=&quot;function&quot;&gt;MsgBox&lt;/span&gt; &lt;span class=&quot;string&quot;&gt;&quot;마지막 행은 &quot;&lt;/span&gt; &amp; lastRow &amp; &lt;span class=&quot;string&quot;&gt;&quot;입니다.&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. For ~ Next 반복문&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    숫자를 1부터 마지막 행까지 1씩 증가시키며 사이의 코드를 반복합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; i &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Long&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 2행부터 마지막 행까지 반복 (1행이 제목줄인 경우)&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;For&lt;/span&gt; i = &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;To&lt;/span&gt; lastRow
    &lt;span class=&quot;comment&quot;&gt;&#x27; A열(1번째 열)의 각 행(i)에 &quot;완료&quot;라고 쓰기&lt;/span&gt;
    Cells(i, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;완료&quot;&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Next&lt;/span&gt; i&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 조건문 (If ~ Then ~ End If)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    특정 조건일 때만 작업을 실행합니다. 짝을 맞춰 닫아주는 &lt;code&gt;End If&lt;/code&gt;가 필수입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; score &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Long&lt;/span&gt;
score = Range(&lt;span class=&quot;string&quot;&gt;&quot;B2&quot;&lt;/span&gt;).Value

&lt;span class=&quot;keyword&quot;&gt;If&lt;/span&gt; score &gt;= &lt;span class=&quot;number&quot;&gt;90&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;Then&lt;/span&gt;
    Range(&lt;span class=&quot;string&quot;&gt;&quot;C2&quot;&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;우수&quot;&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;ElseIf&lt;/span&gt; score &gt;= &lt;span class=&quot;number&quot;&gt;70&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;Then&lt;/span&gt;
    Range(&lt;span class=&quot;string&quot;&gt;&quot;C2&quot;&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;보통&quot;&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Else&lt;/span&gt;
    Range(&lt;span class=&quot;string&quot;&gt;&quot;C2&quot;&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;미달&quot;&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;End If&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 반복문 안의 조건문 (실무 필수 패턴)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &quot;데이터를 쭉 훑으면서, 값이 &#x27;퇴사&#x27;인 사람의 행 배경색을 칠해라&quot; 같은 패턴입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;For&lt;/span&gt; i = &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;To&lt;/span&gt; lastRow
    &lt;span class=&quot;comment&quot;&gt;&#x27; B열의 값이 &quot;퇴사&quot; 이면&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;If&lt;/span&gt; Cells(i, &lt;span class=&quot;string&quot;&gt;&quot;B&quot;&lt;/span&gt;).Value = &lt;span class=&quot;string&quot;&gt;&quot;퇴사&quot;&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;Then&lt;/span&gt;
        &lt;span class=&quot;comment&quot;&gt;&#x27; A~C열 범위의 색을 회색으로 변경&lt;/span&gt;
        Range(Cells(i, &lt;span class=&quot;string&quot;&gt;&quot;A&quot;&lt;/span&gt;), Cells(i, &lt;span class=&quot;string&quot;&gt;&quot;C&quot;&lt;/span&gt;)).Interior.Color = vbGray
    &lt;span class=&quot;keyword&quot;&gt;End If&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Next&lt;/span&gt; i&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. For Each (모든 셀을 콕콕 찍으며 반복)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    행 번호를 숫자로 세지 않고, 정해진 범위(상자) 안에 있는 셀들을 하나씩 꺼내서 작업합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; cell &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Range&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; rng &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Range&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;Set&lt;/span&gt; rng = Range(&lt;span class=&quot;string&quot;&gt;&quot;A1:A10&quot;&lt;/span&gt;) &lt;span class=&quot;comment&quot;&gt;&#x27; 10개의 셀 묶음&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;For Each&lt;/span&gt; cell &lt;span class=&quot;keyword&quot;&gt;In&lt;/span&gt; rng
    &lt;span class=&quot;comment&quot;&gt;&#x27; 셀 값이 비어있다면 &quot;N/A&quot; 입력&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;If&lt;/span&gt; cell.Value = &lt;span class=&quot;string&quot;&gt;&quot;&quot;&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;Then&lt;/span&gt;
        cell.Value = &lt;span class=&quot;string&quot;&gt;&quot;N/A&quot;&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;End If&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Next&lt;/span&gt; cell&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 5 --&gt;
        &lt;section id=&quot;chapter5&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-emerald-100 text-emerald-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 5&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;메모리 배열 (VLOOKUP의 진화)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 속도의 핵심, 메모리 상차&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    데이터가 10만 줄인데 &lt;code&gt;Cells(i, 1).Value&lt;/code&gt; 처럼 셀을 하나씩 읽고 쓰면 모래알을 젓가락으로 옮기는 것과 같아 엑셀이 멈춰버립니다.
                &lt;/p&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    AI가 복잡한 코드를 짜줄 때 &lt;strong&gt;배열(Array)&lt;/strong&gt;을 사용하는 이유가 이 때문입니다.
                    삽으로 모래를 한 번에 통(메모리 배열)에 퍼 담은 뒤, 통 안에서 데이터를 뒤져서 가공하고, 마지막에 엑셀 시트에 한 번에 확 쏟아붓는 방식입니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 시트 데이터를 배열로 한 번에 퍼올리기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;Variant&lt;/code&gt; 변수에 범위를 통째로 집어넣습니다. 이 한 줄로 데이터는 엑셀 시트를 떠나 컴퓨터의 빠른 메모리 공간으로 들어갑니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; arrData &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Variant&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; lastRow &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Long&lt;/span&gt;

lastRow = Cells(Rows.Count, &lt;span class=&quot;string&quot;&gt;&quot;A&quot;&lt;/span&gt;).End(xlUp).Row
&lt;span class=&quot;comment&quot;&gt;&#x27; A1부터 C열 마지막까지의 데이터를 arrData라는 통에 한 번에 담습니다.&lt;/span&gt;
arrData = Range(&lt;span class=&quot;string&quot;&gt;&quot;A1:C&quot;&lt;/span&gt; &amp; lastRow).Value&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 메모리 배열 안에서 읽기 (행, 열)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    배열에 들어간 데이터는 &lt;code&gt;arrData(행번호, 열번호)&lt;/code&gt; 형태로 읽어옵니다. Cells 사용법과 똑같지만 속도는 수백 배 빠릅니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; 배열의 2번째 줄, 1번째 칸(A열 위치) 데이터 꺼내기&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; name &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;String&lt;/span&gt;
name = arrData(&lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;)

&lt;span class=&quot;comment&quot;&gt;&#x27; 주의: 배열 안에서 값을 바꿔도 아직 엑셀 화면(시트)에는 반영되지 않습니다!&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 배열의 크기 확인 (LBound, UBound)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    배열 안에서 반복문을 돌리려면 상자의 크기를 알아야 합니다. &lt;code&gt;UBound(배열, 1)&lt;/code&gt;은 총 행의 개수, &lt;code&gt;UBound(배열, 2)&lt;/code&gt;는 총 열의 개수입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; i &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;Long&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;&#x27; 배열의 첫 줄(보통 1)부터 끝 줄까지 반복&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;For&lt;/span&gt; i = &lt;span class=&quot;function&quot;&gt;LBound&lt;/span&gt;(arrData, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;) &lt;span class=&quot;keyword&quot;&gt;To&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;UBound&lt;/span&gt;(arrData, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;)
    &lt;span class=&quot;comment&quot;&gt;&#x27; 3번째 열의 데이터에 10을 더해라 (메모리 상에서만 수정됨)&lt;/span&gt;
    arrData(i, &lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;) = arrData(i, &lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;) + &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Next&lt;/span&gt; i&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 배열 안에서 값 찾기 (초고속 VLOOKUP 대용)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    엑셀의 VLOOKUP 함수 대신, 데이터 배열을 순식간에 돌면서 원하는 값을 찾아내는 AI 특유의 코딩 패턴입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; searchTarget &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;String&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Dim&lt;/span&gt; foundValue &lt;span class=&quot;keyword&quot;&gt;As&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;String&lt;/span&gt;
searchTarget = &lt;span class=&quot;string&quot;&gt;&quot;홍길동&quot;&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;For&lt;/span&gt; i = &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;To&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;UBound&lt;/span&gt;(arrData, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;)
    &lt;span class=&quot;comment&quot;&gt;&#x27; 배열의 1열(이름)이 &quot;홍길동&quot;이면&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;If&lt;/span&gt; arrData(i, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;) = searchTarget &lt;span class=&quot;keyword&quot;&gt;Then&lt;/span&gt;
        &lt;span class=&quot;comment&quot;&gt;&#x27; 2열(부서명) 값을 변수에 저장하고 반복문 탈출!&lt;/span&gt;
        foundValue = arrData(i, &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;)
        &lt;span class=&quot;keyword&quot;&gt;Exit For&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;End If&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;Next&lt;/span&gt; i&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 가공된 배열을 시트에 한 번에 쏟아붓기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    메모리에서 모든 계산이 끝난 배열을 다시 엑셀 시트에 출력합니다. 크기가 정확히 일치하는 범위를 지정해 줘야 합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;&#x27; A1 칸부터 시작해서, 배열의 크기만큼 범위 크기를 맞춰서 출력합니다.&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;&#x27; Resize(행 갯수, 열 갯수)&lt;/span&gt;
Range(&lt;span class=&quot;string&quot;&gt;&quot;A1&quot;&lt;/span&gt;).Resize(&lt;span class=&quot;function&quot;&gt;UBound&lt;/span&gt;(arrData, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;), &lt;span class=&quot;function&quot;&gt;UBound&lt;/span&gt;(arrData, &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;)).Value = arrData

&lt;span class=&quot;comment&quot;&gt;&#x27; 10만 줄 처리도 이 방식을 쓰면 1초 안에 끝납니다!&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Footer --&gt;
        &lt;footer class=&quot;text-center text-gray-500 py-12 text-sm border-t border-gray-200 mt-10&quot;&gt;
            &lt;p&gt;샘표식품&lt;/p&gt;

        &lt;/footer&gt;

    &lt;/main&gt;
