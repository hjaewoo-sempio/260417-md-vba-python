        &lt;section id=&quot;chapter1&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 1&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;Import &amp; 라이브러리 (도구 상자)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 도구를 책상 위로 꺼내기&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    파이썬은 &quot;모든 기능&quot;을 한 번에 메모리에 올리지 않습니다. 필요한 기능이 담긴 &quot;도구 상자(라이브러리)&quot;를 명시적으로 가져와야(Import) 사용할 수 있습니다.
                &lt;/p&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    AI가 작성한 코드가 시작하자마자 에러(&lt;code&gt;NameError&lt;/code&gt;)가 난다면, 99%는 이 Import 구문이 빠져서입니다. 
                    &quot;Pandas를 써줘&quot;라고 했지만 &lt;code&gt;import pandas&lt;/code&gt;를 빼먹는 경우가 종종 있습니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 별명(Alias) 붙이기 (가장 중요)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &#x27;pandas&#x27;라고 매번 치기 귀찮아서 &#x27;pd&#x27;라는 별명을 붙입니다. 이것은 전 세계 개발자들의 &lt;strong&gt;약속(Convention)&lt;/strong&gt;입니다. AI도 항상 이렇게 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; pandas &lt;span class=&quot;keyword&quot;&gt;as&lt;/span&gt; pd  &lt;span class=&quot;comment&quot;&gt;# pandas를 가져오되, 이름표를 &#x27;pd&#x27;로 붙임&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; numpy &lt;span class=&quot;keyword&quot;&gt;as&lt;/span&gt; np   &lt;span class=&quot;comment&quot;&gt;# numpy를 가져오되, 이름표를 &#x27;np&#x27;로 붙임&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;# 사용: pandas.read_csv가 아니라 pd.read_csv로 씁니다.&lt;/span&gt;
data = pd.read_csv(&lt;span class=&quot;string&quot;&gt;&quot;data.csv&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 도구 상자에서 &#x27;특정 도구&#x27;만 꺼내기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;random&lt;/code&gt;이라는 큰 상자를 다 가져오지 않고, 그 안에 있는 &lt;code&gt;randint&lt;/code&gt;(랜덤 정수 뽑기) 기능 하나만 쏙 꺼냅니다. 코드가 깔끔해집니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;# random 상자에서 randint 기능만 꺼내옵니다.&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;from&lt;/span&gt; random &lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; randint

&lt;span class=&quot;comment&quot;&gt;# 이제 random.randint()라고 안 하고 바로 씁니다.&lt;/span&gt;
lucky_num = randint(&lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;100&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 기본 Import (운영체제 기능)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    별명 없이 그냥 가져오는 경우입니다. 파일 경로를 다루거나 폴더를 만들 때 쓰는 &lt;code&gt;os&lt;/code&gt; 라이브러리가 대표적입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; os

&lt;span class=&quot;comment&quot;&gt;# 현재 폴더에 있는 파일 목록을 가져옵니다.&lt;/span&gt;
files = os.listdir(&lt;span class=&quot;string&quot;&gt;&quot;.&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. JSON 데이터 처리&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    웹사이트나 API와 통신할 때 데이터는 대부분 JSON 형식입니다. 이를 파이썬 딕셔너리로 바꾸기 위해 필수적입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; json

raw_data = &lt;span class=&quot;string&quot;&gt;&#x27;{&quot;name&quot;: &quot;Kim&quot;, &quot;age&quot;: 30}&#x27;&lt;/span&gt;  &lt;span class=&quot;comment&quot;&gt;# 텍스트 형태&lt;/span&gt;
data_dict = json.loads(raw_data)          &lt;span class=&quot;comment&quot;&gt;# 파이썬 딕셔너리로 변환&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 시간 관련 기능&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    프로그램을 잠시 멈추거나(딜레이), 실행 시간을 잴 때 사용합니다. 크롤링할 때 서버 과부하를 막기 위해 자주 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; time

&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;데이터 요청 중...&quot;&lt;/span&gt;)
time.sleep(&lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;)  &lt;span class=&quot;comment&quot;&gt;# 3초 동안 아무것도 안 하고 쉽니다.&lt;/span&gt;
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;완료!&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;


        &lt;!-- Chapter 2 --&gt;
        &lt;section id=&quot;chapter2&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 2&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;변수 (이름표 붙이기)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 타입(Type)을 조심하세요&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    파이썬은 변수를 만들 때 타입을 지정하지 않아도 됩니다(&lt;code&gt;int a = 5&lt;/code&gt; 처럼 안 써도 됨). 하지만 &lt;strong&gt;&quot;문자&quot;와 &quot;숫자&quot;는 엄격히 구분&lt;/strong&gt;합니다.
                    엑셀에서 읽어온 데이터가 눈에는 숫자로 보여도, 실제로는 문자(String)인 경우가 많습니다. 이때 더하기를 하면 계산이 아니라 &#x27;글자 이어붙이기&#x27;가 됩니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 문자와 숫자의 차이 (가장 흔한 실수)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    따옴표(&lt;code&gt;&quot;&quot;&lt;/code&gt;)로 감싸져 있으면 무조건 문자입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;a = &lt;span class=&quot;string&quot;&gt;&quot;100&quot;&lt;/span&gt;  &lt;span class=&quot;comment&quot;&gt;# 문자 100&lt;/span&gt;
b = &lt;span class=&quot;number&quot;&gt;100&lt;/span&gt;    &lt;span class=&quot;comment&quot;&gt;# 숫자 100&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;# print(a + b)  # 에러 발생! 문자와 숫자는 더할 수 없음&lt;/span&gt;
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(a + a)    &lt;span class=&quot;comment&quot;&gt;# 결과: &quot;100100&quot; (글자 이어붙이기)&lt;/span&gt;
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(b + b)    &lt;span class=&quot;comment&quot;&gt;# 결과: 200 (산술 연산)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. f-string (AI가 사랑하는 문자열 조립법)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    변수를 문장 사이에 끼워 넣을 때 가장 세련된 방법입니다. 문자열 앞에 &lt;code&gt;f&lt;/code&gt;를 붙이고 중괄호 &lt;code&gt;{}&lt;/code&gt; 안에 변수를 넣습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;name = &lt;span class=&quot;string&quot;&gt;&quot;박대리&quot;&lt;/span&gt;
score = &lt;span class=&quot;number&quot;&gt;95&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;# 옛날 방식: &quot;이름: &quot; + name + &quot;, 점수: &quot; + str(score) (복잡함)&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;# 요즘 방식 (f-string):&lt;/span&gt;
msg = &lt;span class=&quot;string&quot;&gt;f&quot;이름: {name}, 점수: {score}점&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 타입 변환 (Casting)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    문자를 숫자로(&lt;code&gt;int&lt;/code&gt;), 혹은 숫자를 문자로(&lt;code&gt;str&lt;/code&gt;) 바꿔야 할 때가 있습니다. AI 코드에서 자주 보게 됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;input_val = &lt;span class=&quot;string&quot;&gt;&quot;500&quot;&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;# 계산을 위해 숫자로 변경&lt;/span&gt;
real_num = &lt;span class=&quot;function&quot;&gt;int&lt;/span&gt;(input_val) 
result = real_num + &lt;span class=&quot;number&quot;&gt;100&lt;/span&gt;  &lt;span class=&quot;comment&quot;&gt;# 600&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 불리언 (참/거짓)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;True&lt;/code&gt;와 &lt;code&gt;False&lt;/code&gt;는 앞글자가 대문자여야 합니다. 주로 스위치(ON/OFF) 역할로 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;is_active = &lt;span class=&quot;keyword&quot;&gt;True&lt;/span&gt;
has_error = &lt;span class=&quot;keyword&quot;&gt;False&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;# AI는 주로 이렇게 씁니다&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; is_active:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;시스템 가동&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 변수명 규칙 (Snake Case)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    파이썬에서는 변수 이름을 지을 때 띄어쓰기 대신 언더바(&lt;code&gt;_&lt;/code&gt;)를 쓰는 것이 관례입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;user_email_address = &lt;span class=&quot;string&quot;&gt;&quot;a@b.com&quot;&lt;/span&gt; &lt;span class=&quot;comment&quot;&gt;# (O) 파이썬 스타일&lt;/span&gt;
userEmailAddress = &lt;span class=&quot;string&quot;&gt;&quot;a@b.com&quot;&lt;/span&gt;   &lt;span class=&quot;comment&quot;&gt;# (X) 자바/자바스크립트 스타일&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;# 문법 에러는 아니지만, 파이썬 개발자들은 전자를 선호합니다.&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 3 --&gt;
        &lt;section id=&quot;chapter3&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 3&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;들여쓰기 &amp; 범위 (소속 관계)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 공백이 문법이다&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    다른 언어는 중괄호 &lt;code&gt;{}&lt;/code&gt;로 코드 뭉치를 묶지만, 파이썬은 **들여쓰기(Indentation)**로 묶습니다.
                    &quot;누구 밑에 줄이 맞춰져 있는지&quot;가 실행 여부를 결정합니다. 보통 스페이스바 4칸 혹은 탭(Tab) 1번을 씁니다.
                    AI 코드를 복사해 올 때 줄이 틀어지면 &lt;code&gt;IndentationError&lt;/code&gt;가 발생하니 주의하세요.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. If문의 소속&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    조건이 참일 때만 실행되어야 하는 코드는 반드시 들여쓰기를 해야 합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; score &gt; &lt;span class=&quot;number&quot;&gt;80&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;합격&quot;&lt;/span&gt;)        &lt;span class=&quot;comment&quot;&gt;# if문 안쪽 (조건 만족 시 실행)&lt;/span&gt;
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;축하합니다&quot;&lt;/span&gt;)  &lt;span class=&quot;comment&quot;&gt;# if문 안쪽&lt;/span&gt;
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;종료&quot;&lt;/span&gt;)            &lt;span class=&quot;comment&quot;&gt;# if문 바깥 (무조건 실행)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 반복문의 소속 (가장 중요)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    들여쓰기 된 부분은 N번 반복되고, 들여쓰기가 끝난 부분은 반복이 끝난 후 딱 1번 실행됩니다. 이 차이를 아는 것이 핵심입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; i &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; [&lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;]:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;파일 처리 중...&quot;&lt;/span&gt;) &lt;span class=&quot;comment&quot;&gt;# 3번 실행됨&lt;/span&gt;

&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;완료 알림 메일 전송&quot;&lt;/span&gt;)  &lt;span class=&quot;comment&quot;&gt;# 1번 실행됨 (반복문 밖)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 함수 정의의 소속&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    함수의 내용물은 반드시 함수 이름 아래에 들여쓰기 되어야 합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;my_func&lt;/span&gt;():
    a = &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;
    b = &lt;span class=&quot;number&quot;&gt;20&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;return&lt;/span&gt; a + b  &lt;span class=&quot;comment&quot;&gt;# 여기까지 함수에 포함됨&lt;/span&gt;

c = &lt;span class=&quot;number&quot;&gt;30&lt;/span&gt;            &lt;span class=&quot;comment&quot;&gt;# 함수 바깥임&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 중첩 구조 (Double Indentation)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    If문 안에 For문이 있거나, For문 안에 If문이 있는 경우 들여쓰기가 두 번 들어갑니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; is_working_day:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;출근&quot;&lt;/span&gt;)
    &lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; hour &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; [&lt;span class=&quot;number&quot;&gt;9&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;11&lt;/span&gt;]:
        &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;f&quot;{hour}시 업무&quot;&lt;/span&gt;) &lt;span class=&quot;comment&quot;&gt;# 두 번 들여쓰기 됨&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 흔한 실수 (Indentation Error)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    아래 코드는 에러가 납니다. 함수 내용물이 없거나 줄이 안 맞기 때문입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;hello&lt;/span&gt;():
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;안녕&quot;&lt;/span&gt;) &lt;span class=&quot;comment&quot;&gt;# 에러! 함수 내용물인데 들여쓰기가 안 됨&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;True&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;참&quot;&lt;/span&gt;)
  &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;거짓&quot;&lt;/span&gt;) &lt;span class=&quot;comment&quot;&gt;# 에러! 윗줄과 들여쓰기 칸 수가 다름&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 4 --&gt;
        &lt;section id=&quot;chapter4&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 4&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;리스트 &amp; 딕셔너리 (데이터 정리함)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 순서냐 이름이냐&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    데이터를 여러 개 담을 때 쓰는 두 가지 그릇입니다.
                &lt;/p&gt;
                &lt;ul class=&quot;list-disc list-inside text-gray-600 text-sm space-y-1&quot;&gt;
                    &lt;li&gt;&lt;strong&gt;리스트(List) &lt;code&gt;[]&lt;/code&gt;:&lt;/strong&gt; 순서가 중요합니다. &quot;0번째&quot;, &quot;1번째&quot; 처럼 번호(Index)로 찾습니다.&lt;/li&gt;
                    &lt;li&gt;&lt;strong&gt;딕셔너리(Dict) &lt;code&gt;{}&lt;/code&gt;:&lt;/strong&gt; 이름표(Key)가 중요합니다. &quot;이름이 뭐야?&quot;, &quot;나이가 몇이야?&quot; 처럼 키워드로 찾습니다.&lt;/li&gt;
                &lt;/ul&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 리스트 만들기 및 조회&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    컴퓨터는 숫자를 0부터 셉니다. 뒤에서부터 셀 때는 -1을 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;team = [&lt;span class=&quot;string&quot;&gt;&quot;A&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;B&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;C&quot;&lt;/span&gt;]

first = team[&lt;span class=&quot;number&quot;&gt;0&lt;/span&gt;]   &lt;span class=&quot;comment&quot;&gt;# &quot;A&quot;&lt;/span&gt;
last = team[&lt;span class=&quot;number&quot;&gt;-1&lt;/span&gt;]   &lt;span class=&quot;comment&quot;&gt;# &quot;C&quot; (뒤에서 첫 번째)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 리스트에 내용 추가하기 (append)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    빈 리스트를 만들고 &lt;code&gt;append&lt;/code&gt;로 하나씩 채워 넣는 패턴은 매우 흔합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;results = []          &lt;span class=&quot;comment&quot;&gt;# 빈 리스트&lt;/span&gt;
results.append(&lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;)    &lt;span class=&quot;comment&quot;&gt;# [10]&lt;/span&gt;
results.append(&lt;span class=&quot;number&quot;&gt;20&lt;/span&gt;)    &lt;span class=&quot;comment&quot;&gt;# [10, 20]&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 딕셔너리 만들기 및 조회&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &#x27;키(Key)&#x27;와 &#x27;값(Value)&#x27;의 쌍으로 이루어집니다. 엑셀의 한 행과 비슷합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;user = {
    &lt;span class=&quot;string&quot;&gt;&quot;name&quot;&lt;/span&gt;: &lt;span class=&quot;string&quot;&gt;&quot;홍길동&quot;&lt;/span&gt;,
    &lt;span class=&quot;string&quot;&gt;&quot;age&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;30&lt;/span&gt;
}
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(user[&lt;span class=&quot;string&quot;&gt;&quot;name&quot;&lt;/span&gt;])  &lt;span class=&quot;comment&quot;&gt;# 결과: 홍길동&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 딕셔너리 값 수정/추가&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    이미 있는 키를 부르면 수정이 되고, 없는 키를 부르면 새로 추가됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;info = {&lt;span class=&quot;string&quot;&gt;&quot;price&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;100&lt;/span&gt;}

info[&lt;span class=&quot;string&quot;&gt;&quot;price&quot;&lt;/span&gt;] = &lt;span class=&quot;number&quot;&gt;200&lt;/span&gt;   &lt;span class=&quot;comment&quot;&gt;# 수정&lt;/span&gt;
info[&lt;span class=&quot;string&quot;&gt;&quot;sale&quot;&lt;/span&gt;] = &lt;span class=&quot;keyword&quot;&gt;True&lt;/span&gt;   &lt;span class=&quot;comment&quot;&gt;# 추가 (sale이라는 키가 새로 생김)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 리스트 안에 딕셔너리 (List of Dicts)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;strong&gt;실무 데이터의 90%&lt;/strong&gt;가 이 형태입니다. 엑셀 표를 그대로 코드로 옮기면 이렇게 됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;data = [
    {&lt;span class=&quot;string&quot;&gt;&quot;date&quot;&lt;/span&gt;: &lt;span class=&quot;string&quot;&gt;&quot;1/1&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;val&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;100&lt;/span&gt;},  &lt;span class=&quot;comment&quot;&gt;# 0번 행&lt;/span&gt;
    {&lt;span class=&quot;string&quot;&gt;&quot;date&quot;&lt;/span&gt;: &lt;span class=&quot;string&quot;&gt;&quot;1/2&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;val&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;150&lt;/span&gt;}   &lt;span class=&quot;comment&quot;&gt;# 1번 행&lt;/span&gt;
]

&lt;span class=&quot;comment&quot;&gt;# 1번 행의 &#x27;val&#x27; 값 가져오기&lt;/span&gt;
target = data[&lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;][&lt;span class=&quot;string&quot;&gt;&quot;val&quot;&lt;/span&gt;]  &lt;span class=&quot;comment&quot;&gt;# 150&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 5 --&gt;
        &lt;section id=&quot;chapter5&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 5&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;조건문 (판단 능력)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 질문하고 선택하기&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    AI가 똑똑해 보이는 이유는 조건문을 잘 쓰기 때문입니다. 특히 파이썬의 &lt;code&gt;in&lt;/code&gt; 연산자는 매우 직관적입니다.
                    &quot;리스트 안에 있니?&quot;, &quot;문장 안에 포함되니?&quot;를 영어 문장처럼 물어볼 수 있습니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 숫자 크기 비교&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    가장 기본적인 조건문입니다. &lt;code&gt;if&lt;/code&gt;, &lt;code&gt;elif&lt;/code&gt;(그렇지 않고 만약에), &lt;code&gt;else&lt;/code&gt;(나머지 전부)를 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;stock = &lt;span class=&quot;number&quot;&gt;5&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; stock &gt; &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;충분&quot;&lt;/span&gt;)
&lt;span class=&quot;keyword&quot;&gt;elif&lt;/span&gt; stock &gt; &lt;span class=&quot;number&quot;&gt;0&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;부족 (주문 필요)&quot;&lt;/span&gt;)
&lt;span class=&quot;keyword&quot;&gt;else&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;품절&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 포함 여부 확인 (문자열)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;in&lt;/code&gt;을 사용하면 문장 안에 특정 단어가 있는지 쉽게 찾을 수 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;email = &lt;span class=&quot;string&quot;&gt;&quot;my.name@gmail.com&quot;&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; &lt;span class=&quot;string&quot;&gt;&quot;@&quot;&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; email:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;이메일 형식입니다.&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 포함 여부 확인 (리스트)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    리스트 안에 특정 항목이 있는지 확인할 때도 &lt;code&gt;in&lt;/code&gt;을 씁니다. 반대는 &lt;code&gt;not in&lt;/code&gt;입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;vip_users = [&lt;span class=&quot;string&quot;&gt;&quot;user1&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;user2&quot;&lt;/span&gt;]
current = &lt;span class=&quot;string&quot;&gt;&quot;user3&quot;&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; current &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; vip_users:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;VIP 입장&quot;&lt;/span&gt;)
&lt;span class=&quot;keyword&quot;&gt;else&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;일반 입장&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 논리 연산자 (and / or)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    두 가지 이상의 조건을 동시에 검사할 때 사용합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;age = &lt;span class=&quot;number&quot;&gt;25&lt;/span&gt;
has_card = &lt;span class=&quot;keyword&quot;&gt;True&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;# 나이가 20 이상 &#x27;이고&#x27; 카드가 있어야 함&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; age &gt;= &lt;span class=&quot;number&quot;&gt;20&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;and&lt;/span&gt; has_card:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;결제 가능&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 데이터 존재 여부 체크 (Truthy/Falsy)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    파이썬에서 &lt;strong&gt;비어있는 리스트는 거짓(False)&lt;/strong&gt;으로 취급됩니다. 이를 이용해 데이터가 있는지 없는지 아주 짧게 검사합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;data = []  &lt;span class=&quot;comment&quot;&gt;# 빈 리스트&lt;/span&gt;

&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;not&lt;/span&gt; data:  &lt;span class=&quot;comment&quot;&gt;# &quot;데이터가 없으면&quot; 이라는 뜻&lt;/span&gt;
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;처리할 데이터가 없습니다.&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 6 --&gt;
        &lt;section id=&quot;chapter6&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 6&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;반복문과 Pythonic Style&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 한 줄의 미학&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    반복문은 코드를 획기적으로 줄여줍니다. 특히 파이썬에는 **&quot;리스트 컴프리헨션(List Comprehension)&quot;**이라는 독특한 문법이 있습니다.
                &lt;/p&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    &lt;code&gt;[x*2 for x in nums]&lt;/code&gt; 처럼 &lt;strong&gt;대괄호 안에 반복문이 들어있는 형태&lt;/strong&gt;입니다. AI가 코드를 짜주면 80% 확률로 이 문법을 사용합니다.
                    &quot;복잡해 보이지만, 그냥 반복해서 리스트를 새로 만드는 거구나&quot; 하고 이해하시면 됩니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 기본 For Loop&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    리스트 안에 있는 것을 하나씩 꺼내서 `item`이라는 변수에 담고 반복합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;files = [&lt;span class=&quot;string&quot;&gt;&quot;a.txt&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;b.txt&quot;&lt;/span&gt;]
&lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; item &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; files:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;f&quot;파일 삭제: {item}&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 횟수 지정 반복 (range)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    리스트 없이 그냥 &quot;10번 반복해&quot;라고 하고 싶을 때는 &lt;code&gt;range(숫자)&lt;/code&gt;를 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;# 0, 1, 2, 3, 4 (총 5회)&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; i &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;range&lt;/span&gt;(&lt;span class=&quot;number&quot;&gt;5&lt;/span&gt;):
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;f&quot;{i}번째 시도&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 딕셔너리 반복 (.items)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    키와 값을 동시에 꺼내면서 반복하고 싶을 때 씁니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;scores = {&lt;span class=&quot;string&quot;&gt;&quot;Math&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;90&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;Eng&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;80&lt;/span&gt;}

&lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; subject, score &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; scores.items():
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;f&quot;과목: {subject}, 점수: {score}&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 리스트 컴프리헨션 (Pythonic!)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &quot;기존 리스트를 가공해서 새 리스트 만들기&quot;를 한 줄로 줄인 것입니다.
                    &lt;code&gt;[결과 for 변수 in 리스트]&lt;/code&gt; 형태로 읽습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;nums = [&lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;]

&lt;span class=&quot;comment&quot;&gt;# &quot;nums를 돌면서 각 숫자(n)에 10을 곱해라&quot;&lt;/span&gt;
result = [n * &lt;span class=&quot;number&quot;&gt;10&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; n &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; nums]
&lt;span class=&quot;comment&quot;&gt;# 결과: [10, 20, 30]&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 조건부 리스트 컴프리헨션 (Pythonic!)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    반복을 하면서 필터링(조건)까지 동시에 하는 경우입니다. AI가 데이터 전처리할 때 가장 많이 쓰는 패턴입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;files = [&lt;span class=&quot;string&quot;&gt;&quot;img.png&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;data.csv&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;logo.png&quot;&lt;/span&gt;]

&lt;span class=&quot;comment&quot;&gt;# &quot;파일 목록을 돌면서, &#x27;png&#x27;가 포함된 파일만 골라라&quot;&lt;/span&gt;
png_files = [f &lt;span class=&quot;keyword&quot;&gt;for&lt;/span&gt; f &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; files &lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; &lt;span class=&quot;string&quot;&gt;&quot;png&quot;&lt;/span&gt; &lt;span class=&quot;keyword&quot;&gt;in&lt;/span&gt; f]
&lt;span class=&quot;comment&quot;&gt;# 결과: [&quot;img.png&quot;, &quot;logo.png&quot;]&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 7 --&gt;
        &lt;section id=&quot;chapter7&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 7&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;함수 (Input과 Output)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 자판기 설치 vs 사용&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    함수는 자판기와 같습니다. 돈을 넣으면(Input) 음료가 나옵니다(Output).
                    중요한 건 &lt;strong&gt;설계(Def)&lt;/strong&gt;와 &lt;strong&gt;사용(Call)&lt;/strong&gt;을 구분하는 것입니다. 
                &lt;/p&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    AI가 코드를 짤 때 &lt;code&gt;def ...&lt;/code&gt; 부분은 &quot;이런 기능을 만들 거야&quot;라고 설계도를 그리는 부분입니다. 
                    실제 실행은 코드 맨 아래쪽이나 &lt;code&gt;def&lt;/code&gt; 바깥에서 일어납니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 기본 함수 (Input O, Output O)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    가장 표준적인 함수입니다. 값을 받아서 가공 후 돌려줍니다(Return).
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;# [설계]&lt;/span&gt;
&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;double&lt;/span&gt;(x):
    &lt;span class=&quot;keyword&quot;&gt;return&lt;/span&gt; x * &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;

&lt;span class=&quot;comment&quot;&gt;# [사용]&lt;/span&gt;
res = double(&lt;span class=&quot;number&quot;&gt;10&lt;/span&gt;)
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(res) &lt;span class=&quot;comment&quot;&gt;# 20&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 입력값이 여러 개인 함수&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    콤마(,)로 구분해서 여러 재료를 넣을 수 있습니다. 순서를 맞춰야 합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;add&lt;/span&gt;(a, b):
    &lt;span class=&quot;keyword&quot;&gt;return&lt;/span&gt; a + b

result = add(&lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;5&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 기본값(Default) 설정&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    입력값을 안 넣었을 때 자동으로 적용될 값을 정해둘 수 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;greet&lt;/span&gt;(name, msg=&lt;span class=&quot;string&quot;&gt;&quot;안녕하세요&quot;&lt;/span&gt;):
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;f&quot;{name}님, {msg}&quot;&lt;/span&gt;)

greet(&lt;span class=&quot;string&quot;&gt;&quot;철수&quot;&lt;/span&gt;)              &lt;span class=&quot;comment&quot;&gt;# &quot;철수님, 안녕하세요&quot;&lt;/span&gt;
greet(&lt;span class=&quot;string&quot;&gt;&quot;영희&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;반가워요&quot;&lt;/span&gt;)  &lt;span class=&quot;comment&quot;&gt;# &quot;영희님, 반가워요&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 반환값(Return)이 없는 함수&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    단순히 화면에 출력하거나 파일을 저장하고 끝나는 함수는 &lt;code&gt;return&lt;/code&gt;이 없습니다. 이때 결과를 변수에 담으면 &lt;code&gt;None&lt;/code&gt;(없음)이 됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;log&lt;/span&gt;(msg):
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;f&quot;[LOG] {msg}&quot;&lt;/span&gt;)
    &lt;span class=&quot;comment&quot;&gt;# return 없음&lt;/span&gt;

a = log(&lt;span class=&quot;string&quot;&gt;&quot;시작&quot;&lt;/span&gt;)
&lt;span class=&quot;comment&quot;&gt;# print(a) -&gt; 결과: None&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 흔한 실수 (Return vs Print)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    Print는 화면에 보여줄 뿐, 값을 전달하지 않습니다. 계산을 이어가려면 반드시 Return해야 합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;bad_add&lt;/span&gt;(a, b):
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(a + b) &lt;span class=&quot;comment&quot;&gt;# 화면엔 5가 보이지만...&lt;/span&gt;

res = bad_add(&lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;)
&lt;span class=&quot;comment&quot;&gt;# final = res + 10  -&gt; 에러! res는 비어있음(None)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 8 --&gt;
        &lt;section id=&quot;chapter8&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 8&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;클래스 (사용법 위주)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 점(.)의 의미&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed mb-2&quot;&gt;
                    AI 관리자가 클래스를 직접 설계할 일은 거의 없습니다. 하지만 &lt;code&gt;변수.함수()&lt;/code&gt; 형태는 매일 보게 됩니다.
                &lt;/p&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    여기서 점(&lt;code&gt;.&lt;/code&gt;)은 &quot;네가 가지고 있는 기능을 써라&quot;라는 명령어입니다.
                    &quot;문자열아(.upper), 대문자로 변해라&quot;, &quot;리스트야(.append), 데이터를 추가해라&quot; 처럼, 데이터 타입마다 가지고 있는 전용 기능(메서드)들이 있습니다.
                &lt;/p&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. 문자열(String)의 기능&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    문자열은 대소문자 변환, 쪼개기(split), 공백제거(strip) 등의 기능을 내장하고 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;text = &lt;span class=&quot;string&quot;&gt;&quot; apple &quot;&lt;/span&gt;

clean = text.strip()  &lt;span class=&quot;comment&quot;&gt;# &quot;apple&quot; (공백제거)&lt;/span&gt;
big = clean.upper()   &lt;span class=&quot;comment&quot;&gt;# &quot;APPLE&quot; (대문자)&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. 리스트(List)의 기능&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    리스트는 순서 정렬(sort), 뒤집기(reverse), 추가(append) 등의 기능을 가집니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;nums = [&lt;span class=&quot;number&quot;&gt;3&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;number&quot;&gt;2&lt;/span&gt;]
nums.sort()  &lt;span class=&quot;comment&quot;&gt;# 리스트 자신이 정렬됨&lt;/span&gt;
&lt;span class=&quot;comment&quot;&gt;# 결과: [1, 2, 3]&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. 딕셔너리(Dict)의 기능&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    키만 뽑기(keys), 값만 뽑기(values) 등의 기능이 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;data = {&lt;span class=&quot;string&quot;&gt;&quot;name&quot;&lt;/span&gt;: &lt;span class=&quot;string&quot;&gt;&quot;A&quot;&lt;/span&gt;, &lt;span class=&quot;string&quot;&gt;&quot;age&quot;&lt;/span&gt;: &lt;span class=&quot;number&quot;&gt;20&lt;/span&gt;}

keys = list(data.keys()) 
&lt;span class=&quot;comment&quot;&gt;# 결과: [&quot;name&quot;, &quot;age&quot;]&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. 사용자 정의 클래스 읽기 (__init__)&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    AI가 &lt;code&gt;class&lt;/code&gt;를 정의했다면 &lt;code&gt;__init__&lt;/code&gt; 부분을 보세요. 이 클래스가 처음 생성될 때 어떤 재료(변수)를 필요로 하는지 알 수 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;class&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;User&lt;/span&gt;:
    &lt;span class=&quot;comment&quot;&gt;# 생성자: 처음 만들 때 이름(name)을 내놓으라고 함&lt;/span&gt;
    &lt;span class=&quot;keyword&quot;&gt;def&lt;/span&gt; &lt;span class=&quot;function&quot;&gt;__init__&lt;/span&gt;(self, name):
        self.name = name

u = User(&lt;span class=&quot;string&quot;&gt;&quot;철수&quot;&lt;/span&gt;) &lt;span class=&quot;comment&quot;&gt;# 그래서 만들 때 &quot;철수&quot;를 넣어줌&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. 객체 속성 접근&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    객체 안에 저장된 변수는 &lt;code&gt;객체.변수명&lt;/code&gt;으로 꺼낼 수 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;# 위 예시에서 이어짐&lt;/span&gt;
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(u.name)  
&lt;span class=&quot;comment&quot;&gt;# 결과: &quot;철수&quot;&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Chapter 9 --&gt;
        &lt;section id=&quot;chapter9&quot; class=&quot;bg-white rounded-xl shadow-sm border border-gray-200 p-8&quot;&gt;
            &lt;div class=&quot;border-b border-gray-100 pb-4 mb-6 flex items-center&quot;&gt;
                &lt;div class=&quot;bg-indigo-100 text-indigo-700 font-bold py-1 px-3 rounded text-sm mr-3&quot;&gt;Chapter 9&lt;/div&gt;
                &lt;h2 class=&quot;text-2xl font-bold text-gray-900&quot;&gt;실전 라이브러리 (Pandas &amp; Requests)&lt;/h2&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;explanation-box&quot;&gt;
                &lt;h3 class=&quot;font-bold text-gray-800 mb-2&quot;&gt;📖 이론: 사무 자동화의 양대 산맥&lt;/h3&gt;
                &lt;p class=&quot;text-gray-600 text-sm leading-relaxed&quot;&gt;
                    AI를 이용한 업무 자동화는 결국 이 두 가지로 귀결됩니다.
                &lt;/p&gt;
                &lt;ul class=&quot;list-disc list-inside text-gray-600 text-sm space-y-1&quot;&gt;
                    &lt;li&gt;&lt;strong&gt;Pandas:&lt;/strong&gt; 엑셀 파일 읽기, 데이터 필터링, 통계 내기 (엑셀 대체)&lt;/li&gt;
                    &lt;li&gt;&lt;strong&gt;Requests:&lt;/strong&gt; 웹사이트 접속, API 데이터 가져오기 (인터넷 연결)&lt;/li&gt;
                &lt;/ul&gt;
            &lt;/div&gt;

            &lt;h3 class=&quot;font-bold text-gray-800 text-lg mb-4&quot;&gt;💡 실전 예시 5선&lt;/h3&gt;

            &lt;!-- Ex 1 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;1. Pandas: 엑셀 읽고 확인하기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;read_excel&lt;/code&gt;로 불러오고, &lt;code&gt;head()&lt;/code&gt;로 상위 5줄만 눈으로 확인합니다. 데이터 검증의 첫 단계입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; pandas &lt;span class=&quot;keyword&quot;&gt;as&lt;/span&gt; pd

df = pd.read_excel(&lt;span class=&quot;string&quot;&gt;&quot;sales.xlsx&quot;&lt;/span&gt;)
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(df.head())  &lt;span class=&quot;comment&quot;&gt;# 데이터가 잘 들어왔나 눈으로 확인&lt;/span&gt;&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 2 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;2. Pandas: 데이터 필터링&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    엑셀의 &#x27;필터&#x27; 기능과 같습니다. 조건을 만족하는 행만 뽑아서 새 변수에 저장합니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;# &#x27;금액&#x27; 컬럼이 10000 이상인 행만 추출&lt;/span&gt;
high_value = df[df[&lt;span class=&quot;string&quot;&gt;&#x27;금액&#x27;&lt;/span&gt;] &gt;= &lt;span class=&quot;number&quot;&gt;10000&lt;/span&gt;]&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 3 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;3. Pandas: 새 컬럼(열) 만들기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    엑셀의 수식(C열 = A열 * B열)과 같습니다. 간단하게 곱하기만 하면 모든 행에 적용됩니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;comment&quot;&gt;# &#x27;총액&#x27;이라는 새 열을 만듭니다.&lt;/span&gt;
df[&lt;span class=&quot;string&quot;&gt;&#x27;총액&#x27;&lt;/span&gt;] = df[&lt;span class=&quot;string&quot;&gt;&#x27;단가&#x27;&lt;/span&gt;] * df[&lt;span class=&quot;string&quot;&gt;&#x27;수량&#x27;&lt;/span&gt;]&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 4 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;4. Requests: 웹 연결 확인&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    &lt;code&gt;status_code&lt;/code&gt;가 200이면 성공, 404면 페이지 없음, 500이면 서버 오류입니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;&lt;span class=&quot;keyword&quot;&gt;import&lt;/span&gt; requests

res = requests.get(&lt;span class=&quot;string&quot;&gt;&quot;https://google.com&quot;&lt;/span&gt;)
&lt;span class=&quot;keyword&quot;&gt;if&lt;/span&gt; res.status_code == &lt;span class=&quot;number&quot;&gt;200&lt;/span&gt;:
    &lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(&lt;span class=&quot;string&quot;&gt;&quot;접속 성공&quot;&lt;/span&gt;)&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;

            &lt;!-- Ex 5 --&gt;
            &lt;div class=&quot;example-card&quot;&gt;
                &lt;div class=&quot;example-header&quot;&gt;5. Requests: JSON 데이터 가져오기&lt;/div&gt;
                &lt;div class=&quot;example-desc&quot;&gt;
                    API에서 가져온 데이터를 &lt;code&gt;.json()&lt;/code&gt;으로 변환하면 파이썬의 딕셔너리처럼 쓸 수 있습니다.
                &lt;/div&gt;
                &lt;div class=&quot;relative group&quot;&gt;
                    &lt;button onclick=&quot;copyCode(this)&quot; class=&quot;absolute top-2 right-2 bg-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition&quot;&gt;복사&lt;/button&gt;
                    &lt;pre class=&quot;code-block p-4 text-sm overflow-x-auto&quot;&gt;&lt;code&gt;url = &lt;span class=&quot;string&quot;&gt;&quot;https://api.test.com/users&quot;&lt;/span&gt;
res = requests.get(url)

data = res.json()  &lt;span class=&quot;comment&quot;&gt;# 딕셔너리(혹은 리스트)로 변환&lt;/span&gt;
&lt;span class=&quot;function&quot;&gt;print&lt;/span&gt;(data[&lt;span class=&quot;string&quot;&gt;&quot;name&quot;&lt;/span&gt;])&lt;/code&gt;&lt;/pre&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;

        &lt;!-- Footer --&gt;
        &lt;footer class=&quot;text-center text-gray-500 py-12 text-sm border-t border-gray-200 mt-10&quot;&gt;
            &lt;p&gt;샘표식품&lt;/p&gt;
            &lt;p class=&quot;mt-2 text-xs&quot;&gt;본 매뉴얼은 사내 AI 교육용으로 제작되었습니다.&lt;/p&gt;
        &lt;/footer&gt;
